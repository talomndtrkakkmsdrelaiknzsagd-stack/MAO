<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>五升六暑假学习台</title>
  <style>
    :root {
      --ink: #22242a;
      --muted: #68707c;
      --line: #d9dde5;
      --paper: #fbfaf6;
      --bg: #eef3f5;
      --blue: #2d6cdf;
      --green: #237a57;
      --red: #c55245;
      --amber: #b07418;
      --violet: #6a55b8;
      --white: #ffffff;
      --shadow: 0 10px 28px rgba(32, 40, 54, .08);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255,255,255,.65), rgba(255,255,255,0) 240px),
        var(--bg);
    }

    header {
      padding: 24px clamp(16px, 4vw, 48px) 16px;
      border-bottom: 1px solid var(--line);
      background: var(--paper);
    }

    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      max-width: 1760px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .term-switch {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      flex-shrink: 0;
    }

    .term-switch button,
    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--white);
      color: var(--ink);
      border-radius: 8px;
      min-height: 40px;
      padding: 0 14px;
      cursor: pointer;
    }

    button:hover { border-color: #9aa5b5; }
    button.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    main {
      max-width: 1760px;
      margin: 0 auto;
      padding: 22px clamp(16px, 4vw, 48px) 48px;
      display: grid;
      grid-template-columns: minmax(860px, 1fr) minmax(300px, 360px);
      gap: 22px;
    }

    section {
      background: rgba(255,255,255,.72);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(255,255,255,.74);
    }

    h2 {
      margin: 0;
      font-size: 19px;
      letter-spacing: 0;
    }

    .content { padding: 18px; }
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .metric-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      padding: 12px;
      min-height: 76px;
    }

    .metric strong {
      display: block;
      font-size: 23px;
      line-height: 1.2;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
    }

    .task-list {
      display: grid;
      gap: 10px;
    }

    .task {
      display: grid;
      grid-template-columns: 30px 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      padding: 10px 12px;
    }

    .task input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--green);
    }

    .task-title {
      font-weight: 700;
      line-height: 1.35;
    }

    .task-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      margin-top: 3px;
    }

    .tag {
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      color: #fff;
      white-space: nowrap;
    }

    .tag.cn { background: var(--red); }
    .tag.math { background: var(--blue); }
    .tag.habit { background: var(--green); }
    .tag.parent { background: var(--violet); }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .primary {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .danger {
      color: var(--red);
      border-color: #e2b6af;
    }

    .timer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      padding: 14px;
      margin-top: 14px;
    }

    .time {
      font-size: clamp(34px, 6vw, 54px);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      font-weight: 800;
    }

    .form-grid {
      display: grid;
      gap: 10px;
    }

    label {
      display: grid;
      gap: 6px;
      font-weight: 700;
      font-size: 14px;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      background: #fff;
      color: var(--ink);
      min-height: 40px;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.55;
    }

    .tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .timeline {
      display: grid;
      gap: 12px;
    }

    .week {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      padding: 12px;
    }

    .week-date {
      font-weight: 800;
      color: var(--blue);
      line-height: 1.35;
    }

    .week ul {
      margin: 0;
      padding-left: 18px;
      line-height: 1.65;
    }

    .log-list {
      display: grid;
      gap: 8px;
      max-height: 280px;
      overflow: auto;
      padding-right: 2px;
    }

    .log-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px 12px;
      line-height: 1.55;
    }

    .log-item b { color: var(--amber); }

    .writing-box {
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        #fff;
      background-size: 36px 36px;
      min-height: 180px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      line-height: 36px;
      font-size: 22px;
    }

    .prompt {
      border-left: 4px solid var(--green);
      padding: 10px 12px;
      background: #f2faf6;
      border-radius: 0 8px 8px 0;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .material-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 16px;
    }

    .material-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      padding: 18px;
      line-height: 1.65;
    }

    .material-card h3 {
      margin: 0 0 12px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .material-card p {
      margin: 8px 0;
    }

    .material-card ol {
      margin: 8px 0 0;
      padding-left: 22px;
    }

    .material-card li {
      margin: 8px 0;
    }

    .material-card li input {
      width: min(260px, 100%);
      margin-top: 6px;
    }

    .material-card li label {
      margin-top: 6px;
      max-width: 320px;
    }

    .problem-list {
      display: grid;
      gap: 12px;
      margin-top: 10px;
    }

    .problem-row {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }

    .problem-row:last-child { border-bottom: 0; }

    .problem-no {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 32px;
      height: 28px;
      border-radius: 8px;
      background: #eef3f5;
      color: #4e5967;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .problem-body {
      min-width: 0;
      line-height: 1.8;
    }

    .problem-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
    }

    .level-mark {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 2px 8px;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
    }

    .level-mark.review { background: var(--green); }
    .level-mark.preview { background: var(--violet); }

    .formula {
      font-size: 20px;
      font-weight: 650;
    }

    .reading-text {
      display: grid;
      gap: 10px;
      line-height: 1.85;
      font-size: 16px;
    }

    .reading-text p {
      margin: 0;
      text-indent: 2em;
    }

    .reading-block {
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }

    .reading-block:last-of-type { border-bottom: 0; }

    .reading-block h4 {
      margin: 0 0 10px;
      font-size: 15px;
    }

    .knowledge-list {
      display: grid;
      gap: 8px;
      margin: 10px 0 14px;
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px solid #cfd8e6;
      background: #f6f9ff;
      line-height: 1.65;
      font-size: 15px;
    }

    .knowledge-list b { color: var(--blue); }

    .frac {
      display: inline-grid;
      grid-template-rows: auto auto;
      align-items: center;
      justify-items: center;
      min-width: 1.25em;
      margin: 0 .12em;
      vertical-align: middle;
      line-height: 1.05;
      transform: translateY(-.05em);
    }

    .frac .top {
      display: block;
      width: 100%;
      border-bottom: 1.6px solid currentColor;
      padding: 0 .12em .05em;
      text-align: center;
      font-size: .78em;
    }

    .frac .bottom {
      display: block;
      padding: .05em .12em 0;
      text-align: center;
      font-size: .78em;
    }

    .voice-wrap {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: end;
    }

    .voice-btn {
      min-width: 44px;
      padding: 0 10px;
      font-size: 18px;
      line-height: 1;
    }

    .voice-btn.listening {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    .voice-status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .answer {
      display: none;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      background: #f7f7fb;
      color: #39404a;
      border: 1px dashed #b7becb;
    }

    .answer.show { display: block; }

    .grade-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .grade-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 14px;
    }

    .math-answer-row {
      display: grid;
      grid-template-columns: 1fr minmax(120px, 180px);
      gap: 10px;
      align-items: end;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .math-answer-row:last-child { border-bottom: 0; }

    .result-pill {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 9px;
      margin: 4px 6px 0 0;
      color: #fff;
      font-size: 12px;
    }

    .result-pill.ok { background: var(--green); }
    .result-pill.warn { background: var(--amber); }
    .result-pill.bad { background: var(--red); }

    .footer-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    @media (max-width: 920px) {
      .topbar { align-items: start; flex-direction: column; }
      main { grid-template-columns: 1fr; }
      .metric-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .material-grid { grid-template-columns: 1fr; }
      .grade-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      header { padding-top: 18px; }
      .grid-2 { grid-template-columns: 1fr; }
      .math-answer-row { grid-template-columns: 1fr; }
      .task { grid-template-columns: 28px 1fr; }
      .task .tag { grid-column: 2; width: max-content; }
      .week { grid-template-columns: 1fr; }
      .section-head { align-items: start; flex-direction: column; }
      .timer { grid-template-columns: 1fr; }
    }

    @media print {
      body { background: #fff; }
      header, .toolbar, .timer, .footer-actions, .tabs button, .danger { display: none; }
      main { display: block; padding: 0; }
      section { box-shadow: none; margin-bottom: 12px; break-inside: avoid; }
      .tab-panel { display: block; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1>五升六暑假学习台</h1>
        <p class="subtitle">人教版方向：语文阅读与作文、书写；数学应用题与细心习惯。习惯优先，提分跟进。</p>
      </div>
      <div class="term-switch" aria-label="月份切换">
        <button id="julyBtn" class="active" type="button">7月</button>
        <button id="augBtn" type="button">8月</button>
      </div>
    </div>
  </header>

  <main>
    <div>
      <section>
        <div class="section-head">
          <h2>今日任务</h2>
          <div class="toolbar">
            <input id="studyDate" type="date" aria-label="学习日期" />
            <button id="resetDay" type="button" class="danger">重置今日</button>
          </div>
        </div>
        <div class="content">
          <div class="metric-row">
            <div class="metric"><strong id="doneCount">0/0</strong><span>完成任务</span></div>
            <div class="metric"><strong id="score">0</strong><span>习惯积分</span></div>
            <div class="metric"><strong id="focusPlan">90</strong><span>建议分钟</span></div>
            <div class="metric"><strong id="streak">0</strong><span>连续打卡</span></div>
          </div>
          <div id="taskList" class="task-list"></div>
          <div class="timer">
            <div>
              <div class="time" id="timeLeft">25:00</div>
              <div class="task-note">专注 25 分钟，休息 5 分钟。完成后记录一次“我做对了什么”。</div>
            </div>
            <div class="toolbar">
              <button id="startTimer" type="button" class="primary">开始</button>
              <button id="pauseTimer" type="button">暂停</button>
              <button id="resetTimer" type="button">复位</button>
            </div>
          </div>
        </div>
      </section>

      <section style="margin-top:22px;">
        <div class="section-head">
          <h2>今日素材包</h2>
          <div class="toolbar">
            <button id="prevMaterial" type="button">前一天</button>
            <button id="nextMaterial" type="button">后一天</button>
          </div>
        </div>
        <div class="content">
          <div class="prompt" id="materialFocus"></div>
          <div id="dailyMaterial" class="material-grid"></div>
        </div>
      </section>

      <section style="margin-top:22px;">
        <div class="section-head">
          <h2>学习记录</h2>
          <div class="tabs">
            <button class="tabBtn active" type="button" data-tab="read">阅读</button>
            <button class="tabBtn" type="button" data-tab="essay">作文</button>
            <button class="tabBtn" type="button" data-tab="error">错题</button>
            <button class="tabBtn" type="button" data-tab="hand">书写</button>
            <button class="tabBtn" type="button" data-tab="grade">批改</button>
          </div>
        </div>
        <div class="content">
          <div id="read" class="tab-panel active">
            <div class="grid-2">
              <div class="form-grid">
                <label>书名/文章名<input id="bookTitle" placeholder="例：《草房子》第三章" /></label>
                <label>一句话概括<textarea id="readingSummary" placeholder="谁在什么情况下做了什么，结果怎样。"></textarea></label>
                <label>一个好句<textarea id="readingSentence" placeholder="摘一句，再写为什么好。"></textarea></label>
                <button id="saveReading" type="button" class="primary">保存阅读</button>
              </div>
              <div class="log-list" id="readingLog"></div>
            </div>
          </div>

          <div id="essay" class="tab-panel">
            <div class="prompt" id="essayPrompt"></div>
            <div class="form-grid">
              <label>作文题目<input id="essayTitle" /></label>
              <label>开头三句话<textarea id="essayStart" placeholder="第一句点题，第二句写场景，第三句写冲突或感受。"></textarea></label>
              <label>细节描写<textarea id="essayDetail" placeholder="动作、语言、神态、心理至少选两种。"></textarea></label>
              <div class="footer-actions">
                <button id="newPrompt" type="button">换题</button>
                <button id="saveEssay" type="button" class="primary">保存作文</button>
              </div>
            </div>
          </div>

          <div id="error" class="tab-panel">
            <div class="grid-2">
              <div class="form-grid">
                <label>学科
                  <select id="errorSubject">
                    <option>数学</option>
                    <option>语文</option>
                  </select>
                </label>
                <label>题目/问题<textarea id="errorQuestion"></textarea></label>
                <label>错因
                  <select id="errorReason">
                    <option>审题漏字</option>
                    <option>条件没找全</option>
                    <option>关系没画清</option>
                    <option>计算粗心</option>
                    <option>表达不完整</option>
                    <option>知识点不会</option>
                  </select>
                </label>
                <label>正确思路<textarea id="errorFix"></textarea></label>
                <button id="saveError" type="button" class="primary">保存错题</button>
              </div>
              <div class="log-list" id="errorLog"></div>
            </div>
          </div>

          <div id="hand" class="tab-panel">
            <div class="prompt">每日 10-15 分钟：慢、正、匀、齐。先临写一行，再默写一行，最后自己圈出最好看的 3 个字。</div>
            <div class="writing-box" contenteditable="true" aria-label="书写练习格"></div>
          </div>

          <div id="grade" class="tab-panel">
            <div class="log-list" id="gradeLog"></div>
          </div>
        </div>
      </section>
    </div>

    <div>
      <section>
        <div class="section-head">
          <h2>暑假路线图</h2>
          <button id="printPlan" type="button">打印</button>
        </div>
        <div class="content">
          <div id="timeline" class="timeline"></div>
        </div>
      </section>

      <section style="margin-top:22px;">
        <div class="section-head">
          <h2>家长检查</h2>
          <span class="tag parent">5分钟</span>
        </div>
        <div class="content">
          <div class="task-list">
            <div class="task">
              <input type="checkbox" class="parentCheck" />
              <div><div class="task-title">看完成，不讲太久</div><div class="task-note">只问：今天最认真的是哪一项？</div></div>
              <span class="tag parent">反馈</span>
            </div>
            <div class="task">
              <input type="checkbox" class="parentCheck" />
              <div><div class="task-title">抽查一题或一段</div><div class="task-note">数学看步骤，语文看依据和表达。</div></div>
              <span class="tag parent">抽查</span>
            </div>
            <div class="task">
              <input type="checkbox" class="parentCheck" />
              <div><div class="task-title">记录一个进步</div><div class="task-note">夸具体行为：审题圈关键词、作文加细节、字写端正。</div></div>
              <span class="tag parent">鼓励</span>
            </div>
          </div>
          <div class="footer-actions">
            <button id="exportData" type="button">导出记录</button>
            <button id="clearData" type="button" class="danger">清空记录</button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    const today = formatDate(new Date());
    const state = JSON.parse(localStorage.getItem("studyState") || '{"tasks":{},"reading":[],"essay":[],"errors":[],"grades":[],"score":0,"focus":0}');
    state.grades = state.grades || [];
    let monthMode = "july";
    let timerId = null;
    let seconds = 25 * 60;

    const dailyPlans = {
      july: {
        minutes: 90,
        tasks: [

        [`${x} × ${z}/10`, (x * z / 10).toFixed(1)],
        [`${x + y} ÷ ${z}`, ((x + y) / z).toFixed(2)],
        [`${x}% × ${y * 10}`, (x / 100 * y * 10).toFixed(1)],
        [`${y * 12} ÷ ${z + 3}`, (y * 12 / (z + 3)).toFixed(2)],
        [`(${x} + ${y}) × ${z}`, (x + y) * z],
        [`${x * 2} - ${y} × ${z}`, x * 2 - y * z],
        [`${z}.${y} × 10`, Number(`${z}.${y}`) * 10],
        [`${x + z} ÷ 100`, ((x + z) / 100).toFixed(2)]
      ].map(([q, final]) => ({ q, a: String(final), final: String(final), unit: "" }));
    }

    function bindVoiceButtons() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      document.querySelectorAll(".voice-btn").forEach(button => {
        button.addEventListener("click", () => {
          const target = $(button.dataset.target);
          if (!target) return;
          if (!SpeechRecognition) {
            showVoiceStatus("当前浏览器不支持语音输入，可以使用系统自带听写。");
            return;
          }
          if (activeRecognition) {
            activeRecognition.stop();
            activeRecognition = null;
          }
          const recognition = new SpeechRecognition();
          activeRecognition = recognition;
          recognition.lang = "zh-CN";
          recognition.interimResults = false;
          recognition.continuous = false;
          button.classList.add("listening");
          showVoiceStatus("正在听，请说话。数学答案建议说“二十五点六”“三分之一”或直接说数字。");
          recognition.onresult = (event) => {
            const text = Array.from(event.results).map(result => result[0].transcript).join("");
            insertVoiceText(target, text);
            showVoiceStatus(`已输入：${text}`);
          };
          recognition.onerror = () => {
            showVoiceStatus("没有识别成功，请再试一次，或检查麦克风权限。");
          };
          recognition.onend = () => {
            button.classList.remove("listening");
            activeRecognition = null;
          };
          recognition.start();
        });
      });
    }

    function insertVoiceText(target, text) {
      const cleaned = text.replace(/\s/g, "");
      if (target.tagName === "TEXTAREA") {
        const prefix = target.value.trim() ? "\n" : "";
        target.value += `${prefix}${cleaned}`;
      } else {
        target.value = normalizeSpeechNumber(cleaned);
      }
      target.dispatchEvent(new Event("input", { bubbles: true }));
    }

    function normalizeSpeechNumber(text) {
      let value = text.replace(/[，。]/g, "");
      if (value.includes("分之")) {
        const parts = value.split("分之");
        if (parts.length === 2) {
          return `${chineseNumber(parts[1])}/${chineseNumber(parts[0])}`;
        }
      }
      if (value.includes("点")) {
        const parts = value.split("点");
        const decimals = parts[1].split("").map(chineseDigit).join("");
        return `${chineseNumber(parts[0])}.${decimals}`;
      }
      if (/^[零一二两三四五六七八九十百千万\d]+$/.test(value)) {
        return String(chineseNumber(value));
      }
      return value.replace(/百分之/g, "");
    }

    function chineseDigit(char) {
      return { 零: "0", 一: "1", 二: "2", 两: "2", 三: "3", 四: "4", 五: "5", 六: "6", 七: "7", 八: "8", 九: "9" }[char] || char;
    }

    function chineseNumber(text) {
      if (/^\d+(?:\.\d+)?$/.test(text)) return Number(text);
      const digitMap = { 零: 0, 一: 1, 二: 2, 两: 2, 三: 3, 四: 4, 五: 5, 六: 6, 七: 7, 八: 8, 九: 9 };
      const unitMap = { 十: 10, 百: 100, 千: 1000, 万: 10000 };
      let total = 0;
      let current = 0;
      for (const char of text) {
        if (digitMap[char] != null) {
          current = digitMap[char];
        } else if (unitMap[char]) {
          const unit = unitMap[char];
          if (unit === 10000) {
            total = (total + current) * unit;
            current = 0;
          } else {
            total += (current || 1) * unit;
            current = 0;
          }
        } else if (/\d/.test(char)) {
          current = current * 10 + Number(char);
        }
      }
      return total + current;
    }

    function showVoiceStatus(message) {
      let status = $("voiceStatus");
      if (!status) {
        status = document.createElement("div");
        status.id = "voiceStatus";
        status.className = "voice-status";
        $("dailyMaterial").before(status);
      }
      status.textContent = message;
    }

    function normalizeAnswer(value) {
      return String(value || "")
        .replace(/[，。；;：:\s]/g, "")
        .replace(/％/g, "%")
        .replace(/（/g, "(")
        .replace(/）/g, ")")
        .trim();
    }

    function numericValue(value) {
      const text = normalizeAnswer(value);
      const fraction = text.match(/(-?\d+(?:\.\d+)?)\/(-?\d+(?:\.\d+)?)/);
      if (fraction && Number(fraction[2]) !== 0) {
        return Number(fraction[1]) / Number(fraction[2]);
      }
      const number = text.match(/-?\d+(?:\.\d+)?/);
      return number ? Number(number[0]) : NaN;
    }

    function numericValues(value) {
      const raw = String(value || "").replace(/，/g, ",");
      const matches = raw.match(/-?\d+(?:\.\d+)?(?:\/-?\d+(?:\.\d+)?)?/g) || [];
      return matches.map(item => numericValue(item)).filter(item => !Number.isNaN(item));
    }

    function answersMatch(input, item) {
      const user = normalizeAnswer(input);
      const expected = normalizeAnswer(item.final);
      if (!user) return false;
      if (expected.includes(",")) {
        const userNumbers = numericValues(input);
        return expected.split(",").every(part => {
          const target = numericValue(part);
          return user.includes(part) || userNumbers.some(value => Math.abs(value - target) < 0.015);
        });
      }
      if (user.includes(expected) && expected.length > 0) return true;
      if (item.decimal && user.includes(normalizeAnswer(item.decimal))) return true;
      const userNum = numericValue(user);
      const expectedNum = numericValue(item.final);
      if (!Number.isNaN(userNum) && !Number.isNaN(expectedNum)) {
        return Math.abs(userNum - expectedNum) < 0.015;
      }
      return false;
    }

    function gradeMathWork() {
      const math = makeMath(materialNumber());

      const details = math.map((item, index) => {
        const value = $(`mathAnswer${index}`).value;

        if (ok) correct += 1;
        return `<p><span class="result-pill ${ok ? "ok" : "bad"}">${ok ? "正确" : "需订正"}</span>第 ${index + 1} 题：参考答案 ${formatMathText(item.a)}</p>`;
      }).join("");
      const score = Math.round(correct / math.length * 100);
      const comment = correct === math.length
        ? "很稳，今天的应用题可以进入限时训练。"
        : correct >= Math.ceil(math.length * 0.6)
          ? "有基础，但还要检查条件和单位。订正时请写出数量关系。"
          : "先放慢速度，每题都圈问题、画条件，再列式。";
      $("mathGradeResult").innerHTML = `<b>${score} 分</b><br>${details}<p>${comment}</p>`;
      state.grades.push({ date: dateKey(), subject: "数学", score, comment });
      state.score = (state.score || 0) + (correct === math.length ? 3 : 1);
      save();
      renderTasks();
      renderLogs();

        } else {
          wrong.push(`第 ${index + 1} 题：${formatMathText(item.q)} = ${formatMathText(item.a)}`);

      });
      const score = Math.round(correct / calculations.length * 100);
      const comment = correct >= 18
        ? "计算很稳，继续保持书写清楚和小数点位置准确。"
        : correct >= 14
          ? "计算基本过关，订正时重点看小数点、通分和运算顺序。"
          : "计算准确率还不够，建议明天先慢做 10 题，再限时做 10 题。";
      $("calcGradeResult").innerHTML = `<b>${score} 分</b><br><span class="result-pill ${score >= 90 ? "ok" : score >= 70 ? "warn" : "bad"}">正确 ${correct}/20</span><p>${comment}</p>${wrong.length ? `<p><b>需订正：</b><br>${wrong.join("<br>")}</p>` : ""}`;

    function gradeReadingWork() {
      const text = $("readingWork").value.trim();
      const lengthScore = text.length >= 120 ? 25 : text.length >= 70 ? 18 : text.length >= 35 ? 12 : 6;
      const basisScore = /原文|文中|因为|从.*看出|依据|画/.test(text) ? 25 : 12;
      const completeScore = /主要内容|心情|结尾|作用|好在|说明|表现/.test(text) ? 25 : 15;
      const expressionScore = /。|；|，/.test(text) ? 20 : 12;
      const score = Math.min(100, lengthScore + basisScore + completeScore + expressionScore);
      const tips = [];
      if (basisScore < 20) tips.push("每道题至少写一句“依据在文中哪里”。");
      if (completeScore < 20) tips.push("答题要先正面回答，再结合短文说明。");
      if (text.length < 70) tips.push("答案偏短，可以把原因、依据、感受补完整。");
      if (tips.length === 0) tips.push("阅读答案比较完整，下一步练习把语言写得更简洁。");
      $("readingGradeResult").innerHTML = `<b>${score} 分</b><br><span class="result-pill ${score >= 85 ? "ok" : score >= 70 ? "warn" : "bad"}">${score >= 85 ? "优秀" : score >= 70 ? "合格" : "需加强"}</span><p>${tips.join("<br>")}</p><p>家长评语：今天能围绕短文作答，继续保持“答案回原文”的习惯。</p>`;

      state.score = (state.score || 0) + 2;
      save();
      renderTasks();
      renderLogs();

    function gradeEssayWork() {

      const detailScore = /说|看|想|笑|跑|拿|放|听|心里|眼睛|声音|动作|语言|神态/.test(text) ? 25 : 12;
      const topicScore = /坚持|熟悉|误会|家务|地方|错误|暑假|帮助|感受|明白/.test(text) ? 17 : 10;
      const punctuationScore = /[。！？]/.test(text) ? 15 : 8;
      const score = Math.min(100, lengthScore + paragraphScore + detailScore + topicScore + punctuationScore);
      const tips = [];
      if (length < 120) tips.push("字数偏少，补一个经过细节或心理活动。");
      if (detailScore < 20) tips.push("增加动作、语言、神态或心理描写，至少补 2 句。");
      if (paragraphScore < 15) tips.push("试着分成开头、经过、感受三部分。");

            <div class="task-note">${task[1]}</div>
          </div>
          <span class="tag ${task[2]}">${task[2] === "cn" ? "语文" : task[2] === "math" ? "数学" : "习惯"}</span>
        `;
        item.querySelector("input").addEventListener("change", (event) => {
          state.tasks[taskKey(index)] = event.target.checked;
          state.score = Math.max(0, (state.score || 0) + (event.target.checked ? 2 : -2));
          save();
          renderTasks();
        });
        $("taskList").appendChild(item);
      });
      $("doneCount").textContent = `${done}/${plan.tasks.length}`;
      $("score").textContent = state.score || 0;
      $("streak").textContent = calcStreak();
    }

    function calcStreak() {
      const days = new Set(Object.keys(state.tasks || {}).filter(k => state.tasks[k]).map(k => k.slice(0, 10)));
      let count = 0;
      const cursor = new Date(dateKey());
      while (days.has(formatDate(cursor))) {
        count += 1;
        cursor.setDate(cursor.getDate() - 1);
      }
      return count;
    }

    function renderTimeline() {
      $("timeline").innerHTML = "";
      route[monthMode].forEach(([date, items]) => {
        const week = document.createElement("div");
        week.className = "week";
        week.innerHTML = `<div class="week-date">${date}</div><ul>${items.map(item => `<li>${item}</li>`).join("")}</ul>`;
        $("timeline").appendChild(week);
      });
    }

    function setMode(mode) {
      monthMode = mode;
      $("julyBtn").classList.toggle("active", mode === "july");
      $("augBtn").classList.toggle("active", mode === "august");
      renderTasks();
      renderTimeline();
      renderMaterial();
    }

    function syncModeToDate() {
      const month = Number(dateKey().split("-")[1]);
      if (month === 8) {
        setMode("august");
      } else {
        setMode("july");
      }
    }

    function shiftDate(offset) {
      const [year, month, day] = dateKey().split("-").map(Number);
      const date = new Date(year, month - 1, day);
      date.setDate(date.getDate() + offset);
      $("studyDate").value = formatDate(date);
      syncModeToDate();
    }

    function renderLogs() {
      $("readingLog").innerHTML = state.reading.slice().reverse().map(item =>
        `<div class="log-item"><b>${item.date}</b><br>${item.title}<br>${item.summary}<br>${item.sentence}</div>`
      ).join("") || '<div class="task-note">暂无阅读记录</div>';
      $("errorLog").innerHTML = state.errors.slice().reverse().map(item =>
        `<div class="log-item"><b>${item.date} · ${item.subject}</b><br>${item.question}<br>错因：${item.reason}<br>改法：${item.fix}</div>`
      ).join("") || '<div class="task-note">暂无错题记录</div>';
      $("gradeLog").innerHTML = state.grades.slice().reverse().map(item =>
        `<div class="log-item"><b>${item.date} · ${item.subject} · ${item.score} 分</b><br>${item.comment}</div>`
      ).join("") || '<div class="task-note">暂无批改记录</div>';
    }

    function setPrompt() {
      $("essayPrompt").textContent = prompts[Math.floor(Math.random() * prompts.length)];
    }

    function updateTimer() {
      const min = String(Math.floor(seconds / 60)).padStart(2, "0");
      const sec = String(seconds % 60).padStart(2, "0");
      $("timeLeft").textContent = `${min}:${sec}`;
    }

    $("studyDate").value = today;
    $("studyDate").addEventListener("change", syncModeToDate);
    $("julyBtn").addEventListener("click", () => setMode("july"));
    $("augBtn").addEventListener("click", () => setMode("august"));
    $("prevMaterial").addEventListener("click", () => shiftDate(-1));
    $("nextMaterial").addEventListener("click", () => shiftDate(1));
    $("resetDay").addEventListener("click", () => {
      dailyPlans[monthMode].tasks.forEach((_, index) => delete state.tasks[taskKey(index)]);
      save();
      renderTasks();
    });

    document.querySelectorAll(".tabBtn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tabBtn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        $(btn.dataset.tab).classList.add("active");
      });
    });

    $("saveReading").addEventListener("click", () => {
      if (!$("bookTitle").value.trim()) return;
      state.reading.push({
        date: dateKey(),
        title: $("bookTitle").value.trim(),
        summary: $("readingSummary").value.trim(),
        sentence: $("readingSentence").value.trim()
      });
      state.score = (state.score || 0) + 3;
      $("bookTitle").value = "";
      $("readingSummary").value = "";
      $("readingSentence").value = "";
      save();
      renderLogs();
      renderTasks();
    });

    $("saveEssay").addEventListener("click", () => {
      if (!$("essayTitle").value.trim()) return;
      state.essay.push({
        date: dateKey(),
        title: $("essayTitle").value.trim(),
        start: $("essayStart").value.trim(),
        detail: $("essayDetail").value.trim()
      });
      state.score = (state.score || 0) + 5;
      $("essayTitle").value = "";
      $("essayStart").value = "";
      $("essayDetail").value = "";
      save();
      renderTasks();
      setPrompt();
    });

    $("saveError").addEventListener("click", () => {
      if (!$("errorQuestion").value.trim()) return;
      state.errors.push({
        date: dateKey(),
        subject: $("errorSubject").value,
        question: $("errorQuestion").value.trim(),
        reason: $("errorReason").value,
        fix: $("errorFix").value.trim()
      });
      state.score = (state.score || 0) + 4;
      $("errorQuestion").value = "";
      $("errorFix").value = "";
      save();
      renderLogs();
      renderTasks();
    });

    $("newPrompt").addEventListener("click", setPrompt);
    $("printPlan").addEventListener("click", () => window.print());
    $("exportData").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `学习记录-${dateKey()}.json`;
      a.click();
      URL.revokeObjectURL(url);
    });
    $("clearData").addEventListener("click", () => {
      if (!confirm("确认清空所有本地记录？")) return;
      localStorage.removeItem("studyState");
      location.reload();
    });

    $("startTimer").addEventListener("click", () => {
      if (timerId) return;
      timerId = setInterval(() => {
        seconds -= 1;
        if (seconds <= 0) {
          clearInterval(timerId);
          timerId = null;
          seconds = 25 * 60;
          state.focus = (state.focus || 0) + 25;
          state.score = (state.score || 0) + 2;
          save();
        }
        updateTimer();
        renderTasks();
      }, 1000);
    });
    $("pauseTimer").addEventListener("click", () => {
      clearInterval(timerId);
      timerId = null;
    });
    $("resetTimer").addEventListener("click", () => {
      clearInterval(timerId);
      timerId = null;
      seconds = 25 * 60;
      updateTimer();
    });

    setPrompt();
    syncModeToDate();
    renderLogs();
    updateTimer();
  </script>
</body>
</html>
